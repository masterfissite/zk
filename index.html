<script>

let time = 5;

const count = document.getElementById("count");
const btn = document.getElementById("btn");

const timer = setInterval(() => {

    time--;

    count.innerHTML = time;

    if(time <= 0){

        clearInterval(timer);

        count.style.display = "none";

        btn.style.display = "inline-block";
    }

},1000);

</script>
